<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<style>
:root {
  --bg: #0e0f13;
  --panel: #15171d;
  --panel-2: #1b1e26;
  --sidebar: #111317;
  --border: #2a2d37;
  --text: #eef0f4;
  --text-dim: #9499a8;
  --accent: #6e7bff;
  --accent-2: #8f5bff;
  --user-bubble: linear-gradient(135deg, #6e7bff, #8f5bff);
  --bot-bubble: #1f222b;
  --radius: 16px;
  --code-bg: #0d0e12;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  overflow: hidden;
}

/* ---------- Sidebar ---------- */
#sidebar {
  width: 260px;
  background: var(--sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transition: margin-left 0.2s ease;
}

#sidebar.collapsed { margin-left: -260px; }

.sidebar-top {
  padding: 16px;
  border-bottom: 1px solid var(--border);
}

.new-chat-btn {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--panel-2);
  color: var(--text);
  cursor: pointer;
  font-size: 13.5px;
  font-weight: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: all 0.15s ease;
}
.new-chat-btn:hover { border-color: var(--accent); color: var(--accent); }

#history-list {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.history-item {
  padding: 10px 12px;
  border-radius: 10px;
  font-size: 13px;
  color: var(--text-dim);
  cursor: pointer;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
  transition: background 0.12s ease;
}
.history-item:hover { background: var(--panel-2); color: var(--text); }
.history-item.active { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); }
.history-item .title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.history-item .del-btn {
  opacity: 0;
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 13px;
  flex-shrink: 0;
}
.history-item:hover .del-btn { opacity: 1; }
.history-item .del-btn:hover { color: #ff6e6e; }

.sidebar-bottom {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-dim);
}

/* ---------- Main column ---------- */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 22px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.brand { display: flex; align-items: center; gap: 12px; }

.sidebar-toggle {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 18px;
  padding: 4px;
  margin-right: 4px;
}
.sidebar-toggle:hover { color: var(--text); }

.brand .dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 12px var(--accent);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.85); }
}
.brand h1 { font-size: 16px; font-weight: 600; margin: 0; }
.brand .status { font-size: 12px; color: var(--text-dim); }

.header-actions { display: flex; gap: 8px; align-items: center; }

/* Mode switcher */
.mode-switch {
  display: flex;
  background: var(--panel-2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 3px;
  gap: 2px;
}
.mode-btn {
  padding: 6px 12px;
  border-radius: 8px;
  border: none;
  background: transparent;
  color: var(--text-dim);
  font-size: 12.5px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s ease;
  white-space: nowrap;
}
.mode-btn.active { background: var(--accent); color: white; }
.mode-btn:not(.active):hover { color: var(--text); }

.icon-btn {
  background: var(--panel-2);
  border: 1px solid var(--border);
  color: var(--text-dim);
  width: 36px; height: 36px;
  border-radius: 10px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s ease;
}
.icon-btn:hover { color: var(--text); border-color: var(--accent); background: var(--panel); }

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 28px 16% 28px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  scroll-behavior: smooth;
}
@media (max-width: 1000px) { #chat { padding: 24px 16px; } }

.empty-state {
  margin: auto;
  text-align: center;
  color: var(--text-dim);
  animation: fadeIn 0.5s ease;
}
.empty-state .glyph { font-size: 42px; margin-bottom: 12px; opacity: 0.8; }
.empty-state h2 { color: var(--text); font-weight: 600; margin: 0 0 6px; }
.empty-state p { margin: 0; font-size: 14px; }

.row { display: flex; margin: 6px 0; animation: rise 0.28s ease; }
.row.user { justify-content: flex-end; }
.row.bot { justify-content: flex-start; }

@keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.bubble-wrap { max-width: 78%; }
.bubble {
  padding: 12px 16px;
  border-radius: var(--radius);
  line-height: 1.55;
  font-size: 14.5px;
  word-wrap: break-word;
}
.row.user .bubble { background: var(--user-bubble); color: white; border-bottom-right-radius: 4px; }
.row.bot .bubble { background: var(--bot-bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

.bubble p { margin: 0 0 10px; }
.bubble p:last-child { margin-bottom: 0; }
.bubble ul, .bubble ol { margin: 6px 0; padding-left: 22px; }
.bubble li { margin: 3px 0; }
.bubble strong { font-weight: 600; }
.bubble code:not(pre code) {
  background: rgba(255,255,255,0.08);
  padding: 2px 6px;
  border-radius: 5px;
  font-size: 13px;
  font-family: 'Consolas', monospace;
}

/* Code block */
.code-block {
  margin: 10px 0;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--border);
  background: var(--code-bg);
}
.code-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 12px;
  background: #181a20;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-dim);
  font-family: 'Consolas', monospace;
}
.copy-btn {
  background: var(--panel-2);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 11.5px;
  padding: 4px 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s ease;
}
.copy-btn:hover { color: var(--text); border-color: var(--accent); }
.copy-btn.copied { color: #6effa0; border-color: #6effa0; }
.code-block pre {
  margin: 0;
  padding: 14px;
  overflow-x: auto;
  font-size: 13px;
}
.code-block code { font-family: 'Consolas', 'Monaco', monospace; }

/* Thinking block */
.thinking-block {
  margin-bottom: 10px;
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  background: #181a20;
}
.thinking-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 12px;
  cursor: pointer;
  font-size: 12.5px;
  color: var(--text-dim);
  user-select: none;
}
.thinking-toggle:hover { color: var(--text); }
.thinking-toggle .chev { transition: transform 0.15s ease; font-size: 10px; }
.thinking-block.open .chev { transform: rotate(90deg); }
.thinking-content {
  display: none;
  padding: 0 14px 12px;
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.5;
  border-top: 1px solid var(--border);
  padding-top: 10px;
  white-space: pre-wrap;
}
.thinking-block.open .thinking-content { display: block; }

.meta { font-size: 11px; color: var(--text-dim); margin-top: 4px; padding: 0 4px; }
.row.user .meta { text-align: right; }

.typing { display: flex; gap: 4px; padding: 6px 4px; }
.typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); animation: bounce 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: 0.15s; }
.typing span:nth-child(3) { animation-delay: 0.3s; }
@keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-5px); opacity: 1; } }

footer { padding: 14px 16% 18px; flex-shrink: 0; }
@media (max-width: 1000px) { footer { padding: 12px 16px 16px; } }

.input-bar {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 8px 8px 8px 18px;
  transition: border-color 0.15s ease;
}
.input-bar:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(110, 123, 255, 0.15); }

#input {
  flex: 1; background: transparent; border: none; color: var(--text);
  font-size: 14.5px; font-family: inherit; resize: none; outline: none;
  max-height: 160px; padding: 8px 0; line-height: 1.4;
}
#input::placeholder { color: var(--text-dim); }

#sendBtn {
  width: 38px; height: 38px; border-radius: 12px; border: none;
  background: var(--accent); color: white; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: transform 0.1s ease, background 0.15s ease;
}
#sendBtn:hover { background: var(--accent-2); transform: scale(1.05); }
#sendBtn:active { transform: scale(0.95); }
#sendBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.hint { text-align: center; font-size: 11px; color: var(--text-dim); margin-top: 8px; }

/* Modal */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  display: none; align-items: center; justify-content: center;
  z-index: 50; animation: fadeIn 0.2s ease;
}
.overlay.open { display: flex; }
.modal {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: var(--radius); width: 90%; max-width: 420px;
  padding: 24px; animation: rise 0.25s ease;
}
.modal h3 { margin: 0 0 4px; font-size: 17px; }
.modal p { color: var(--text-dim); font-size: 13px; margin: 0 0 18px; line-height: 1.5; }
.field-label { font-size: 12px; color: var(--text-dim); margin-bottom: 6px; display: block; }
.modal input, .modal select {
  width: 100%; background: var(--panel-2); border: 1px solid var(--border);
  color: var(--text); padding: 10px 12px; border-radius: 10px;
  font-size: 14px; margin-bottom: 16px; outline: none; font-family: inherit;
}
.modal input:focus, .modal select:focus { border-color: var(--accent); }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
.btn { padding: 9px 18px; border-radius: 10px; border: none; cursor: pointer; font-size: 13.5px; font-weight: 500; font-family: inherit; transition: opacity 0.15s ease; }
.btn:hover { opacity: 0.85; }
.btn-primary { background: var(--accent); color: white; }
.btn-ghost { background: transparent; color: var(--text-dim); }

.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
  padding: 10px 18px; border-radius: 10px; font-size: 13px; opacity: 0;
  transition: all 0.25s ease; pointer-events: none; z-index: 100;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

#chat::-webkit-scrollbar, #history-list::-webkit-scrollbar { width: 8px; }
#chat::-webkit-scrollbar-track, #history-list::-webkit-scrollbar-track { background: transparent; }
#chat::-webkit-scrollbar-thumb, #history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }

</style>
</head>
<body>
<div id="sidebar">
  <div class="sidebar-top">
    <button class="new-chat-btn" id="newChatBtn">+ New chat</button>
  </div>
  <div id="history-list"></div>
  <div class="sidebar-bottom">Nova · Local + Groq</div>
</div>

<div id="main">
  <header>
    <div class="brand">
      <button class="sidebar-toggle" id="sidebarToggle">☰</button>
      <div class="dot"></div>
      <div>
        <h1>Nova</h1>
        <div class="status" id="statusText">Not connected</div>
      </div>
    </div>
    <div class="header-actions">
      <div class="mode-switch">
        <button class="mode-btn" data-mode="quick">Quick</button>
        <button class="mode-btn active" data-mode="normal">Normal</button>
        <button class="mode-btn" data-mode="deep">Deep</button>
      </div>
      <button class="icon-btn" id="clearBtn" title="Clear this conversation">🗑</button>
      <button class="icon-btn" id="settingsBtn" title="Settings">⚙</button>
    </div>
  </header>

  <div id="chat">
    <div class="empty-state" id="emptyState">
      <div class="glyph">✦</div>
      <h2>Start a conversation</h2>
      <p>Type a message below to begin.</p>
    </div>
  </div>

  <footer>
    <div class="input-bar">
      <textarea id="input" placeholder="Message Nova..." rows="1"></textarea>
      <button id="sendBtn" title="Send">➤</button>
    </div>
    <div class="hint">Enter to send · Shift+Enter for new line</div>
  </footer>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h3>Connection settings</h3>
    <p>Paste your own Groq API key below. It's saved in this browser's local storage on your PC only — never sent anywhere except Groq's API.</p>
    <label class="field-label">Groq API key</label>
    <input type="password" id="apiKeyInput" placeholder="gsk_...">
    <label class="field-label">Model</label>
    <select id="modelSelect">
      <option value="llama-3.3-70b-versatile">Llama 3.3 70B (smartest, recommended)</option>
      <option value="llama-3.1-8b-instant">Llama 3.1 8B (fastest)</option>
      <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
      <option value="gemma2-9b-it">Gemma2 9B</option>
    </select>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="cancelSettings">Cancel</button>
      <button class="btn btn-primary" id="saveSettings">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===================== State =====================
let apiKey = localStorage.getItem("nova_api_key") || "";
let model = localStorage.getItem("nova_model") || "llama-3.3-70b-versatile";
let mode = "normal";
let conversations = JSON.parse(localStorage.getItem("nova_conversations") || "[]");
let activeId = null;
let isSending = false;

// ===================== Mode configs =====================
const MODES = {
  quick: {
    label: "Quick",
    systemPrompt: "Answer as concisely as possible. One to three sentences when feasible. No preamble, no filler, get straight to the point.",
    showThinking: false
  },
  normal: {
    label: "Normal",
    systemPrompt: "Answer clearly and helpfully with normal reasoning depth. Be thorough where it matters, concise where it doesn't.",
    showThinking: false
  },
  deep: {
    label: "Deep",
    systemPrompt: "Think through this problem carefully and step by step before giving your final answer. First, work through your reasoning: consider the question from multiple angles, check for edge cases, and verify your logic. Wrap ALL of this reasoning in <thinking></thinking> tags. Then, after the closing </thinking> tag, give a clear, well-organized final answer. Always use this format for every response.",
    showThinking: true
  }
};

// ===================== Elements =====================
const chat = document.getElementById("chat");
const emptyState = document.getElementById("emptyState");
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
const overlay = document.getElementById("overlay");
const settingsBtn = document.getElementById("settingsBtn");
const cancelSettings = document.getElementById("cancelSettings");
const saveSettings = document.getElementById("saveSettings");
const apiKeyInput = document.getElementById("apiKeyInput");
const modelSelect = document.getElementById("modelSelect");
const statusText = document.getElementById("statusText");
const clearBtn = document.getElementById("clearBtn");
const toast = document.getElementById("toast");
const newChatBtn = document.getElementById("newChatBtn");
const historyList = document.getElementById("history-list");
const sidebarToggle = document.getElementById("sidebarToggle");
const sidebar = document.getElementById("sidebar");
const modeButtons = document.querySelectorAll(".mode-btn");

marked.setOptions({ breaks: true });

// ===================== Conversation persistence =====================
function saveConversations() {
  localStorage.setItem("nova_conversations", JSON.stringify(conversations));
}

function getActiveConvo() {
  return conversations.find(c => c.id === activeId);
}

function createConversation() {
  const convo = { id: Date.now().toString(), title: "New chat", messages: [] };
  conversations.unshift(convo);
  activeId = convo.id;
  saveConversations();
  renderHistory();
  renderChat();
}

function renderHistory() {
  historyList.innerHTML = "";
  conversations.forEach(c => {
    const item = document.createElement("div");
    item.className = "history-item" + (c.id === activeId ? " active" : "");
    const title = document.createElement("span");
    title.className = "title";
    title.textContent = c.title || "New chat";
    const del = document.createElement("button");
    del.className = "del-btn";
    del.textContent = "✕";
    del.onclick = (e) => {
      e.stopPropagation();
      deleteConversation(c.id);
    };
    item.appendChild(title);
    item.appendChild(del);
    item.onclick = () => {
      activeId = c.id;
      renderHistory();
      renderChat();
    };
    historyList.appendChild(item);
  });
}

function deleteConversation(id) {
  conversations = conversations.filter(c => c.id !== id);
  saveConversations();
  if (activeId === id) {
    if (conversations.length > 0) {
      activeId = conversations[0].id;
    } else {
      createConversation();
      return;
    }
  }
  renderHistory();
  renderChat();
}

function updateConvoTitle(convo, firstUserMsg) {
  if (convo.title === "New chat" && firstUserMsg) {
    convo.title = firstUserMsg.slice(0, 40) + (firstUserMsg.length > 40 ? "..." : "");
    saveConversations();
    renderHistory();
  }
}

// ===================== Render chat from active conversation =====================
function renderChat() {
  chat.innerHTML = "";
  const convo = getActiveConvo();
  if (!convo || convo.messages.length === 0) {
    chat.appendChild(emptyState);
    emptyState.style.display = "flex";
    return;
  }
  emptyState.style.display = "none";
  convo.messages.forEach(m => {
    renderMessageRow(m.role === "user" ? "user" : "bot", m.content, m.time);
  });
  chat.scrollTop = chat.scrollHeight;
}

// ===================== Message rendering =====================
function timeNow() {
  return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

function parseThinking(rawText) {
  const match = rawText.match(/<thinking>([\s\S]*?)<\/thinking>/i);
  if (match) {
    const thinking = match[1].trim();
    const answer = rawText.replace(match[0], "").trim();
    return { thinking, answer };
  }
  return { thinking: null, answer: rawText };
}

function renderMarkdownWithCodeBlocks(container, text) {
  container.innerHTML = marked.parse(text);
  container.querySelectorAll("pre code").forEach(codeEl => {
    hljs.highlightElement(codeEl);
    const pre = codeEl.parentElement;
    const lang = (codeEl.className.match(/language-(\w+)/) || [, "text"])[1];

    const block = document.createElement("div");
    block.className = "code-block";

    const headerEl = document.createElement("div");
    headerEl.className = "code-header";
    const langLabel = document.createElement("span");
    langLabel.textContent = lang;
    const copyBtn = document.createElement("button");
    copyBtn.className = "copy-btn";
    copyBtn.textContent = "Copy";
    copyBtn.onclick = () => {
      navigator.clipboard.writeText(codeEl.textContent);
      copyBtn.textContent = "Copied!";
      copyBtn.classList.add("copied");
      setTimeout(() => { copyBtn.textContent = "Copy"; copyBtn.classList.remove("copied"); }, 1500);
    };
    headerEl.appendChild(langLabel);
    headerEl.appendChild(copyBtn);

    pre.parentElement.insertBefore(block, pre);
    block.appendChild(headerEl);
    block.appendChild(pre);
  });
}

function renderMessageRow(who, rawText, time) {
  emptyState.style.display = "none";
  const row = document.createElement("div");
  row.className = "row " + who;

  const wrap = document.createElement("div");
  wrap.className = "bubble-wrap";

  if (who === "bot") {
    const { thinking, answer } = parseThinking(rawText);
    if (thinking) {
      const tBlock = document.createElement("div");
      tBlock.className = "thinking-block";
      const toggle = document.createElement("div");
      toggle.className = "thinking-toggle";
      toggle.innerHTML = '<span class="chev">▶</span><span>Thought process</span>';
      toggle.onclick = () => tBlock.classList.toggle("open");
      const content = document.createElement("div");
      content.className = "thinking-content";
      content.textContent = thinking;
      tBlock.appendChild(toggle);
      tBlock.appendChild(content);
      wrap.appendChild(tBlock);
    }
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    renderMarkdownWithCodeBlocks(bubble, answer);
    wrap.appendChild(bubble);
  } else {
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = rawText;
    wrap.appendChild(bubble);
  }

  const meta = document.createElement("div");
  meta.className = "meta";
  meta.textContent = (who === "user" ? "You · " : "Nova · ") + (time || timeNow());
  wrap.appendChild(meta);

  row.appendChild(wrap);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return row;
}

function addTyping() {
  emptyState.style.display = "none";
  const row = document.createElement("div");
  row.className = "row bot";
  row.id = "typingRow";
  const bubble = document.createElement("div");
  bubble.className = "bubble typing";
  bubble.innerHTML = "<span></span><span></span><span></span>";
  row.appendChild(bubble);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}
function removeTyping() {
  const row = document.getElementById("typingRow");
  if (row) row.remove();
}

// ===================== Settings modal =====================
function openSettings() {
  apiKeyInput.value = apiKey;
  modelSelect.value = model;
  overlay.classList.add("open");
  apiKeyInput.focus();
}
function closeSettings() { overlay.classList.remove("open"); }

settingsBtn.onclick = openSettings;
cancelSettings.onclick = closeSettings;
overlay.onclick = (e) => { if (e.target === overlay) closeSettings(); };

saveSettings.onclick = () => {
  apiKey = apiKeyInput.value.trim();
  model = modelSelect.value;
  localStorage.setItem("nova_api_key", apiKey);
  localStorage.setItem("nova_model", model);
  updateStatus();
  closeSettings();
  showToast(apiKey ? "Saved — key stored on this PC" : "Key cleared");
};

function updateStatus() {
  statusText.textContent = apiKey ? "Connected · " + model : "Not connected — click ⚙ to add your API key";
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2200);
}

// ===================== Mode switching =====================
modeButtons.forEach(btn => {
  btn.onclick = () => {
    modeButtons.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    mode = btn.dataset.mode;
  };
});

// ===================== New chat / clear =====================
newChatBtn.onclick = () => createConversation();

clearBtn.onclick = () => {
  const convo = getActiveConvo();
  if (!convo || convo.messages.length === 0) return;
  if (!confirm("Clear this conversation?")) return;
  convo.messages = [];
  convo.title = "New chat";
  saveConversations();
  renderHistory();
  renderChat();
};

// ===================== Sidebar toggle =====================
sidebarToggle.onclick = () => sidebar.classList.toggle("collapsed");

// ===================== Auto-resize textarea =====================
input.addEventListener("input", () => {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 160) + "px";
});
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
sendBtn.onclick = sendMessage;

// ===================== Sending messages =====================
async function sendMessage() {
  const text = input.value.trim();
  if (!text || isSending) return;

  if (!apiKey) {
    showToast("Add your API key first");
    openSettings();
    return;
  }

  let convo = getActiveConvo();
  if (!convo) { createConversation(); convo = getActiveConvo(); }

  const userTime = timeNow();
  renderMessageRow("user", text, userTime);
  convo.messages.push({ role: "user", content: text, time: userTime });
  updateConvoTitle(convo, text);
  saveConversations();

  input.value = "";
  input.style.height = "auto";

  isSending = true;
  sendBtn.disabled = true;
  addTyping();

  const apiMessages = [
    { role: "system", content: MODES[mode].systemPrompt },
    ...convo.messages.map(m => ({ role: m.role, content: m.content }))
  ];

  try {
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + apiKey
      },
      body: JSON.stringify({ model: model, messages: apiMessages })
    });
    const data = await res.json();
    removeTyping();

    if (data.error) {
      renderMessageRow("bot", "Error: " + data.error.message, timeNow());
    } else {
      const reply = data.choices[0].message.content;
      const botTime = timeNow();
      renderMessageRow("bot", reply, botTime);
      convo.messages.push({ role: "assistant", content: reply, time: botTime });
      saveConversations();
    }
  } catch (err) {
    removeTyping();
    renderMessageRow("bot", "Connection error: " + err.message, timeNow());
  } finally {
    isSending = false;
    sendBtn.disabled = false;
    input.focus();
  }
}

// ===================== Init =====================
window.addEventListener("load", () => {
  updateStatus();
  if (conversations.length === 0) {
    createConversation();
  } else {
    activeId = conversations[0].id;
    renderHistory();
    renderChat();
  }
  if (!apiKey) openSettings();
});

</script>
</body>
</html>
